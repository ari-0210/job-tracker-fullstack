# docker-compose.yml

services:
  # 数据库服务
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # 'volumes' 在 db 服务下，缩进4个空格
      # 下面这一行是列表项，所以有连字符 '-'
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Redis 服务
  redis-cache:
    image: redis:7.0-alpine # alpine 版本体积极小，适合生产环境
    container_name: deadline-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379" # 映射端口
    volumes:
      - redis_data:/data # 数据持久化卷，防止容器重启后缓存全丢

  # 后端服务
  backend:
    build: ./backend
    image: jobtracker-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}
      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - FILE_UPLOAD_PATH=${UPLOAD_DIR:-/app/uploads}
      # 限制堆内存最大 256M，防止 JVM 抢占宿主机所有内存导致疯狂 GC
      - JAVA_OPTS=-Xms128m -Xmx256m -XX:+UseG1GC
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # 单个日志文件最大 10M
        max-file: "3" # 最多保留 3 个文件
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M # 给 JVM 堆外内存留出缓冲空间
    volumes:
      - ./uploads:/app/uploads

  # 前端服务
  frontend: # <-- 'frontend' 缩进2个空格，与 'db' 同级
    build: ./frontend
    image: jobtracker-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./uploads:/app/uploads
      # 把服务器上的 ssl 文件夹，映射到容器里的 /etc/nginx/certs 文件夹
      - ./ssl:/etc/nginx/certs

volumes: # <-- 这一行没有任何缩进，与顶部的 'version' 和 'services' 左对齐
  mysql-data:
  redis_data:
    # 可以把这行留空，或者为它添加驱动等配置，例如：
    # driver: local

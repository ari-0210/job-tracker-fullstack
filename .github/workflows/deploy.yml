name: Deploy Frontend to Cloud Server

# 触发条件：当向 main 分支 push 代码时自动执行
on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Ubuntu 虚拟机

    steps:
      - name: 4. 远程 SSH 连接服务器并发布上线
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 进入服务器上的项目目录
            cd /root/deadline-tracker/ 

            # 强制对齐 GitHub 最新代码
            git fetch origin
            git reset --hard origin/main

            # 兼容旧版 docker-compose 命令重新构建并启动前端容器
            # 使用 docker-compose（带连字符）避免 unknown shorthand flag 报错
            docker-compose up -d --build frontend || docker compose up --build -d

            #清理废弃的临时构建镜像（防止占用云服务器磁盘）
            docker image prune -f

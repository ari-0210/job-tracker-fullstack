name: Deploy Frontend to Cloud Server

# 触发条件：当向 main 分支 push 代码时自动执行
on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 在 GitHub 虚拟机拉取源码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. 在 GitHub 虚拟机里快速编译打包 Java (生成 target/*.jar)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build Backend on GitHub Runner
        run: |
          cd backend
          mvn clean package -DskipTests
          # 删除冗余的 plain/original jar
          rm -f target/*-plain.jar target/*.original

      # 2. 在 GitHub 的高配虚拟机上编译前端 Dist 静态文件
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 3. 将编译好的 app.jar 和 dist 文件夹用 SCP 安全传输到服务器
      - name: Copy Files to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/target/app.jar,frontend/dist,docker-compose.yml,backend/Dockerfile,frontend/Dockerfile,frontend/nginx.conf"
          target: "/root/deadline-tracker/"
          strip_components: 0

      - name: 远程 SSH 连接服务器并发布上线
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 彻底停止并删除旧容器，释放旧的网络和配置占用（关键！能规避 ContainerConfig 冲突）
            docker-compose down

            # 2. 重新构建镜像
            docker-compose build --no-cache

            # 3. 全新启动
            docker-compose up -d

            #清理废弃的临时构建镜像（防止占用云服务器磁盘）
            docker image prune -f

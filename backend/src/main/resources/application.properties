# ===================================================================
# JobTracker Application Properties Template (.example)
# ??????? application.properties ??????/???????
# ===================================================================
spring.application.name=DDLTracker
spring.profiles.active=jpa

# -------------------------------------------------------------------
# 1. Database Configuration
# -------------------------------------------------------------------
# ????????? your_db_name ????????????
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:your_db_name}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -------------------------------------------------------------------
# 2. Security & JWT Configuration
# -------------------------------------------------------------------
jwt.secret=${JWT_SECRET_KEY:YOUR_SUPER_SECRET_JWT_KEY_HERE_WHICH_IS_VERY_LONG_AND_SAFE}
# ???????? 86400000 (24??)
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# -------------------------------------------------------------------
# 3. Redis Cache Configuration
# -------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD:}

# -------------------------------------------------------------------
# 4. File Upload Assets Infrastructure
# -------------------------------------------------------------------
# ??????????? Linux ?????????
file.upload-path=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB


